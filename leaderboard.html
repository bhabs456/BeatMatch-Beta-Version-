<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0015" />
    <title>BeatMatch – Leaderboard</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style1.css" />
  </head>

  <body>
    
    <div class="bg-canvas"></div>
    <div class="beat-pulse"></div>
    <div class="particles" id="particles"></div>
    <div class="equalizer" id="equalizer"></div>

    <a class="back-btn" href="../index.html">← Back to Game</a>

    <div class="page-wrapper">
      <div class="leaderboard-card">
        <div class="lb-header">
          <div class="lb-title">🏅 Leaderboard</div>
          <div class="lb-subtitle">Top Players · Global Rankings</div>
        </div>

        <div class="neon-divider"></div>

        <!-- Podium Top 3 -->
        <div class="podium-section">
          <div class="podium-card rank-2">
            <span class="podium-medal">🥈</span>
            <div class="podium-rank">#2</div>
            <div class="podium-name">NeonViper</div>
            <div class="podium-score">48,750</div>
            <div class="podium-level">LVL 12</div>
          </div>
          <div class="podium-card rank-1">
            <span class="podium-medal">🥇</span>
            <div class="podium-rank">#1</div>
            <div class="podium-name">CyberBeat</div>
            <div class="podium-score">62,400</div>
            <div class="podium-level">LVL 15</div>
          </div>
          <div class="podium-card rank-3">
            <span class="podium-medal">🥉</span>
            <div class="podium-rank">#3</div>
            <div class="podium-name">PulseRider</div>
            <div class="podium-score">41,300</div>
            <div class="podium-level">LVL 10</div>
          </div>
        </div>

        <div class="neon-divider"></div>

        <!-- Full Table -->
        <div class="table-section">
          <div class="table-label">📋 All Rankings</div>
          <table class="lb-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Player</th>
                <th>Level</th>
                <th>Score</th>
              </tr>
            </thead>
            <tbody id="tbodyRows"></tbody>
          </table>
        </div>

        <div class="lb-cta">
          <a class="cta-btn" href="../index.html">▶ &nbsp;Play Now</a>
        </div>
      </div>
    </div>

    <script src="../js/stats.js"></script>
  </body>
</html>
