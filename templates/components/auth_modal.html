<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="auth-modal-overlay" id="authModal">
      <div class="auth-modal" id="authModalBox">
        <button class="auth-close" id="authClose">✕</button>

        <!-- Tabs -->
        <div class="auth-tabs">
          <button class="auth-tab active" id="tabLogin">Login</button>
          <button class="auth-tab" id="tabSignup">Sign Up</button>
        </div>

        <!-- ── LOGIN PANEL ── -->
        <div id="panelLogin">
          <div class="auth-heading">
            <div class="auth-emoji">🎵</div>
            <div class="auth-title">Welcome Back</div>
            <div class="auth-sub">Login to save your score</div>
          </div>
          <div class="auth-fields">
            <input
              class="auth-input"
              id="loginUser"
              type="text"
              placeholder="Username"
              autocomplete="username"
            />
            <input
              class="auth-input"
              id="loginPass"
              type="password"
              placeholder="Password"
              autocomplete="current-password"
            />
            <div class="auth-error" id="loginError"></div>
            <button class="auth-submit" id="doLoginBtn">▶ &nbsp;Login</button>
            <div class="auth-footer">
              No account?
              <span class="auth-footer-link" id="switchToSignup">Sign Up</span
              >&nbsp;&nbsp;·&nbsp;&nbsp;<span
                class="auth-footer-link"
                id="guestPlay"
                >Play as Guest</span
              >
            </div>
          </div>
        </div>

        <!-- ── SIGN UP PANEL ── -->
        <div id="panelSignup" style="display: none">
          <div class="auth-heading">
            <div class="auth-emoji">🚀</div>
            <div class="auth-title">Create Account</div>
            <div class="auth-sub">Join the BeatMatch community</div>
          </div>
          <div class="auth-fields">
            <input
              class="auth-input"
              id="signupUser"
              type="text"
              placeholder="Username or Email"
              autocomplete="username"
            />
            <input
              class="auth-input"
              id="signupEmail"
              type="email"
              placeholder="Email address"
              autocomplete="email"
            />
            <input
              class="auth-input"
              id="signupPass"
              type="password"
              placeholder="Create a password"
              autocomplete="new-password"
            />
            <input
              class="auth-input"
              id="signupPass2"
              type="password"
              placeholder="Confirm password"
              autocomplete="new-password"
            />
            <div class="auth-error" id="signupError"></div>
            <button class="auth-submit" id="doSignupBtn">
              ✦ &nbsp;Create Account
            </button>
            <div class="auth-footer">
              Already have an account?
              <span class="auth-footer-link" id="switchToLogin">Login</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
